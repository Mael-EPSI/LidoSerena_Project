<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription client</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 20px;
        }
        form {
            max-width: 400px;
            margin: 30px auto;
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
        }
        input[type="submit"] {
            background-color: gray;
            color: #fff;
            border: none;
            padding: 10px;
            cursor: pointer;
            width: 100%;
        }
        input[type="submit"]:hover {
            background-color: #333;
        }
        .error {
            color: red;
            font-weight: bold;
            text-align: center;
            display: none;
        }
        .success {
            color: green;
            font-weight: bold;
            text-align: center;
            display: none;
        }
        .lien {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }
        .lien a {
            color: gray;
        }
    </style>
</head>
<body>
    <form method="POST" action="../api/inscription_client.php">
        <h1>Inscription</h1>
        <div id="error-msg" class="error"></div>
        <div id="success-msg" class="success"></div>

        <label for="nom">Nom :</label>
        <input type="text" id="nom" name="nom" required>

        <label for="prenom">Prénom :</label>
        <input type="text" id="prenom" name="prenom" required>

        <label for="password">Mot de passe :</label>
        <input type="password" id="password" name="password" required>

        <label for="password_confirm">Confirmer le mot de passe :</label>
        <input type="password" id="password_confirm" name="password_confirm" required>

        <input type="submit" value="S'inscrire">

        <div class="lien">
            <a href="co_clients.html">Déjà un compte ? Se connecter</a>
        </div>
    </form>

    <script>
        const params = new URLSearchParams(window.location.search);
        const err = params.get('error');
        const ok = params.get('success');

        const errEl = document.getElementById('error-msg');
        const okEl = document.getElementById('success-msg');

        const messages = {
            champs: 'Veuillez remplir tous les champs.',
            passwords: 'Les mots de passe ne correspondent pas.',
            existe: 'Ce nom d\'utilisateur est déjà pris.',
            db: 'Erreur serveur, réessayez plus tard.'
        };

        if (err && messages[err]) {
            errEl.textContent = messages[err];
            errEl.style.display = 'block';
        }
        if (ok === '1') {
            okEl.textContent = 'Compte créé avec succès ! Vous pouvez vous connecter.';
            okEl.style.display = 'block';
        }
    </script>
</body>
</html>
